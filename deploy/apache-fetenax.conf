# Apache VirtualHost for FetenaX
# Requires: PHP 8.2+, MySQL 8.0+, mod_rewrite, mod_headers, mod_deflate

<VirtualHost *:80>
    ServerName fetenax.great-site.net
    DocumentRoot /var/www/fetenax

    # Redirect to HTTPS
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName fetenax.great-site.net
    DocumentRoot /var/www/fetenax

    # SSL (Let's Encrypt — run: certbot --apache -d fetenax.great-site.net)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/fetenax.great-site.net/cert.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/fetenax.great-site.net/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/fetenax.great-site.net/chain.pem

    # PHP-FPM (PHP 8.2)
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Security: restrict PHP to app directory only
    php_admin_value open_basedir "/var/www/fetenax:/tmp"
    php_admin_value display_errors Off
    php_admin_value expose_php Off
    # Disable dangerous PHP functions in production
    php_admin_value disable_functions "exec,passthru,shell_exec,system,proc_open,popen,curl_multi_exec,parse_ini_file,show_source"

    # Directory settings
    <Directory /var/www/fetenax>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css text/javascript application/javascript application/json
    </IfModule>

    # Cache static assets
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/css "access plus 1 day"
        ExpiresByType application/javascript "access plus 1 day"
        ExpiresByType image/png "access plus 7 days"
        ExpiresByType image/jpeg "access plus 7 days"
        ExpiresByType image/svg+xml "access plus 7 days"
    </IfModule>

    # Security headers
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self' cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdn.jsdelivr.net; font-src fonts.gstatic.com; img-src 'self' data:; connect-src 'self';"
    </IfModule>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/fetenax_error.log
    CustomLog ${APACHE_LOG_DIR}/fetenax_access.log combined
</VirtualHost>
