# =============================================================================
# FetenaX – Apache Configuration
# =============================================================================
# Place in:  /etc/apache2/sites-available/fetenax.conf
# Enable:    a2ensite fetenax && systemctl reload apache2
# Requires:  a2enmod ssl rewrite headers proxy_fcgi
# =============================================================================

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
<VirtualHost *:80>
    ServerName fetenax.example.com
    Redirect permanent / https://fetenax.example.com/
</VirtualHost>

# ── HTTPS server ───────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName fetenax.example.com

    # ── SSL Certificates (obtain via Let's Encrypt / Certbot) ──────────
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/fetenax.example.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/fetenax.example.com/privkey.pem

    # ── Modern TLS settings ────────────────────────────────────────────
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off

    # ── HSTS – tell browsers to always use HTTPS ──────────────────────
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # ── Security headers ───────────────────────────────────────────────
    Header always set X-Content-Type-Options    nosniff
    Header always set X-Frame-Options           DENY
    Header always set Referrer-Policy           "strict-origin-when-cross-origin"
    Header always set X-XSS-Protection          "1; mode=block"

    # ── Document root ──────────────────────────────────────────────────
    DocumentRoot /var/www/fetenax

    <Directory /var/www/fetenax>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── PHP-FPM passthrough ────────────────────────────────────────────
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/var/run/php/php8.1-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    # ── Block access to .env ───────────────────────────────────────────
    <Files ".env">
        Require all denied
    </Files>

    # ── Cache static assets ────────────────────────────────────────────
    <FilesMatch "\.(css|js|jpg|jpeg|png|gif|webp|ico|svg|woff2?|ttf|eot)$">
        Header set Cache-Control "max-age=2592000, public, no-transform"
    </FilesMatch>
</VirtualHost>
