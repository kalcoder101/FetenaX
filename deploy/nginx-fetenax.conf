# =============================================================================
# FetenaX – Nginx Configuration
# =============================================================================
# Place in:  /etc/nginx/sites-available/fetenax
# Enable:    ln -s /etc/nginx/sites-available/fetenax /etc/nginx/sites-enabled/
# Verify:    nginx -t && systemctl reload nginx
# =============================================================================

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name fetenax.example.com;

    # Redirect everything to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fetenax.example.com;

    # ── SSL Certificates (obtain via Let's Encrypt / Certbot) ──────────
    ssl_certificate     /etc/letsencrypt/live/fetenax.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fetenax.example.com/privkey.pem;

    # ── Modern TLS settings ────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # ── HSTS – tell browsers to always use HTTPS ──────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Security headers ───────────────────────────────────────────────
    add_header X-Content-Type-Options    nosniff                          always;
    add_header X-Frame-Options           DENY                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block"                  always;

    # ── Document root ──────────────────────────────────────────────────
    root /var/www/fetenax;
    index index.php;

    # ── PHP-FPM passthrough ────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass            unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        include                 fastcgi_params;
    }

    # ── Static assets – cache aggressively ────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Block access to hidden files (like .env, .git) ────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Explicit .env block ───────────────────────────────────────────
    location = /\.env {
        deny all;
        return 404;
    }
}
