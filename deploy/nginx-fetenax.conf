# Nginx server block for FetenaX
# Requires: PHP 8.2-FPM, MySQL 8.0+

server {
    listen 80;
    server_name fetenax.example.com;
    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fetenax.example.com;

    root /var/www/fetenax;
    index index.php;

    # SSL (Let's Encrypt — run: certbot --nginx -d fetenax.example.com)
    ssl_certificate /etc/letsencrypt/live/fetenax.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fetenax.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Hide server version
    server_tokens off;

    # PHP production settings via fastcgi_param
    fastcgi_param PHP_VALUE "display_errors=Off\nexpose_php=Off\nlog_errors=On";

    # Main routing — try static files first, fall back to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "display_errors=Off\nexpose_php=Off\nlog_errors=On";
    }

    # Block direct access to sensitive files
    location ~ /\.(env|htaccess|git) { deny all; }
    location ~ \.(sql|csv|md|log|ini)$ { deny all; }

    # Static asset caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Block direct access to db.php, db-connection.php, api/*.php
    location ~ ^/(db|db-connection)\.php$ { deny all; }
    location ~ ^/api/.*\.php$ { deny all; }
}
